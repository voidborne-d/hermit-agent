<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" width="240" height="260" role="img" aria-label="Hermit Agent — a hermit crab whose shell bears the Claude sunburst">
  <title>Hermit Agent logo</title>

  <!-- Shell: dome with a Claude-style sunburst inside, suggesting "borrowed Claude shell" -->
  <g>
    <path d="M 120 22
             Q 202 22 212 102
             Q 212 142 178 152
             L 62 152
             Q 28 142 28 102
             Q 38 22 120 22 Z"
          fill="#D97757" stroke="#8F3E2D" stroke-width="3"/>

    <!-- highlight rim -->
    <path d="M 85 46 Q 120 32 155 46"
          fill="none" stroke="#F2A98B" stroke-width="3" stroke-linecap="round" opacity="0.85"/>

    <!-- Claude sunburst rays -->
    <g stroke="#8F3E2D" stroke-width="4" stroke-linecap="round" fill="none">
      <line x1="120" y1="90" x2="120" y2="44"/>
      <line x1="120" y1="90" x2="158" y2="58"/>
      <line x1="120" y1="90" x2="180" y2="90"/>
      <line x1="120" y1="90" x2="158" y2="126"/>
      <line x1="120" y1="90" x2="82" y2="126"/>
      <line x1="120" y1="90" x2="60" y2="90"/>
      <line x1="120" y1="90" x2="82" y2="58"/>
    </g>
    <circle cx="120" cy="90" r="10" fill="#8F3E2D"/>
    <circle cx="120" cy="90" r="4" fill="#F2A98B"/>
  </g>

  <!-- Crab body (crescent under the shell) -->
  <ellipse cx="120" cy="172" rx="52" ry="22" fill="#8B5E3C"/>

  <!-- Claws -->
  <g fill="#6B4423">
    <path d="M 72 170 L 36 188 L 24 178 L 28 166 L 48 160 Z"/>
    <path d="M 168 170 L 204 188 L 216 178 L 212 166 L 192 160 Z"/>
    <!-- pincer lines -->
    <line x1="36" y1="188" x2="42" y2="174" stroke="#3E2412" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="204" y1="188" x2="198" y2="174" stroke="#3E2412" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Eyes on stalks (peeking from the shell) -->
  <g>
    <line x1="108" y1="164" x2="104" y2="150" stroke="#6B4423" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="132" y1="164" x2="136" y2="150" stroke="#6B4423" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="104" cy="148" r="6" fill="#FFFFFF" stroke="#3E2412" stroke-width="2"/>
    <circle cx="136" cy="148" r="6" fill="#FFFFFF" stroke="#3E2412" stroke-width="2"/>
    <circle cx="104" cy="149" r="2.8" fill="#3E2412"/>
    <circle cx="136" cy="149" r="2.8" fill="#3E2412"/>
  </g>

  <!-- Legs -->
  <g stroke="#6B4423" stroke-width="4.5" stroke-linecap="round" fill="none">
    <path d="M 86 188 Q 66 208 54 232"/>
    <path d="M 102 193 Q 86 218 80 244"/>
    <path d="M 120 195 Q 120 222 120 248"/>
    <path d="M 138 193 Q 154 218 160 244"/>
    <path d="M 154 188 Q 174 208 186 232"/>
  </g>

  <!-- Ground shadow -->
  <ellipse cx="120" cy="254" rx="70" ry="4" fill="#3E2412" opacity="0.12"/>
</svg>
